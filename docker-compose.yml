services:
  # ── Base de datos PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: pmic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pmic_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "4231"
    ports:
      - "5432:5432"
    volumes:
      - pmic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d pmic_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pmic_pgdata:
